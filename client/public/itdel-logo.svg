<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- IT Del Logo: Institut Teknologi Del -->
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#006837" stroke="#006837" stroke-width="1"/>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Stylized shield shape -->
  <path d="M50 18 L72 28 L72 56 Q72 74 50 84 Q28 74 28 56 L28 28 Z" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- IT Del initials inside shield -->
  <!-- I -->
  <rect x="33" y="38" width="4" height="24" fill="#FFFFFF" rx="1"/>

  <!-- T -->
  <rect x="40" y="38" width="14" height="4" fill="#FFFFFF" rx="1"/>
  <rect x="45" y="42" width="4" height="20" fill="#FFFFFF" rx="1"/>

  <!-- D -->
  <rect x="58" y="38" width="4" height="24" fill="#FFFFFF" rx="1"/>
  <rect x="62" y="38" width="4" height="3" fill="#FFFFFF" rx="0"/>
  <rect x="62" y="59" width="4" height="3" fill="#FFFFFF" rx="0"/>
  <path d="M66 41 Q74 41 74 50 Q74 59 66 59 Z" fill="#FFFFFF"/>

  <!-- Gold accent -->
  <rect x="20" y="76" width="60" height="3" fill="#FFD700" rx="1"/>
</svg>
