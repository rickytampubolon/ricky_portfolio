<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Ricky Halomoan | Lead Product Manager</title>
    <script>
      // Single Page Apps for GitHub Pages
      // Redirects all 404s back to index.html, preserving the path in the query string
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + '/?p=' +
        encodeURIComponent(l.pathname + l.search) + l.hash
      );
    </script>
  </head>
  <body></body>
</html>
